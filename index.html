<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="UCJapan合同会社 宅建士向け実務マニュアル。申込から入居完了までの業務フロー、Asana・Slack・IT重説の手順を網羅。">
  <meta name="theme-color" content="#2563eb">

  <title>宅建士実務マニュアル | UCJapan合同会社</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <!-- ===== Header ===== -->
  <header id="site-header">
    <button id="menu-toggle" aria-label="メニューを開く">☰</button>
    <span id="site-title">宅建士実務マニュアル｜UCJapan合同会社</span>
    <div id="header-actions">
      <div id="search-box" role="search">
        <span id="search-icon">🔍</span>
        <input
          type="search"
          id="search-input"
          placeholder="キーワードで検索..."
          autocomplete="off"
          aria-label="マニュアルを検索"
        >
        <button id="search-clear" aria-label="検索をクリア">✕</button>
      </div>
      <button id="dark-toggle" title="ダークモードに切り替え">🌙</button>
    </div>
  </header>

  <!-- ===== Search Results Dropdown ===== -->
  <div id="search-results" role="listbox" aria-label="検索結果"></div>

  <!-- ===== App Layout ===== -->
  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar" aria-label="目次">
      <div id="sidebar-inner">
        <div id="toc-title">目次</div>
        <nav id="toc" aria-label="マニュアル目次"></nav>
      </div>
    </aside>

    <!-- Overlay (mobile) -->
    <div id="overlay" aria-hidden="true"></div>

    <!-- Main -->
    <div id="main-wrapper">
      <main id="content" aria-label="マニュアル本文">
        <!-- Markdown rendered here by script.js -->
      </main>
    </div>

  </div>

  <!-- Back to top -->
  <button id="back-to-top" aria-label="ページ先頭へ戻る" title="先頭へ">↑</button>

  <!-- ===== Scripts ===== -->
  <!-- marked.js: Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <!-- Fuse.js: Fuzzy full-text search -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <!-- App logic -->
  <script src="assets/script.js"></script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>

</body>
</html>
